<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-brand">
      <h1>TaskFlow</h1>
      <p>Team Task Management</p>
    </div>
    <div class="auth-tabs">
      <button class="tab-btn active" onclick="showTab('login')">Login</button>
      <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@email.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••" required />
      </div>
      <button type="submit" class="btn-primary">Login →</button>
      <p id="loginError" class="error-msg"></p>
    </form>

    <!-- Signup Form -->
    <form id="signupForm" class="auth-form hidden">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@email.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min 6 characters" required />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="signupRole">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn-primary">Create Account →</button>
      <p id="signupError" class="error-msg"></p>
    </form>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>TaskFlow — Tasks</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <nav class="navbar">
    <span class="brand"> TaskFlow</span>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="projects.html">Projects</a>
      <a href="tasks.html" class="active">Tasks</a>
    </div>
    <div class="nav-user">
      <span id="navUserName"></span>
      <span id="navUserRole" class="badge"></span>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h2 class="page-title">Tasks</h2>
      <button class="btn-primary" onclick="openTaskModal()">+ New Task</button>
    </div>

    <div class="filters">
      <select id="filterProject" onchange="loadTasks()">
        <option value="">All Projects</option>
      </select>
      <select id="filterStatus" onchange="loadTasks()">
        <option value="">All Status</option>
        <option value="todo">To Do</option>
        <option value="in-progress">In Progress</option>
        <option value="done">Done</option>
      </select>
    </div>

    <div class="kanban-board">
      <div class="kanban-col">
        <div class="kanban-header todo">📋 To Do</div>
        <div id="todoCol" class="kanban-tasks"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-header inprogress">⚙️ In Progress</div>
        <div id="inprogressCol" class="kanban-tasks"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-header done">✅ Done</div>
        <div id="doneCol" class="kanban-tasks"></div>
      </div>
    </div>
  </main>

  <!-- Task Modal -->
  <div id="taskModal" class="modal hidden">
    <div class="modal-content">
      <h3>New Task</h3>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="taskTitle" placeholder="Task title" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="taskDesc" placeholder="Details..."></textarea>
      </div>
      <div class="form-group">
        <label>Project</label>
        <select id="taskProject"></select>
      </div>
      <div class="form-group">
        <label>Assign To</label>
        <select id="taskAssignee"></select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="taskPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" id="taskDueDate" />
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeTaskModal()">Cancel</button>
        <button class="btn-primary" onclick="saveTask()">Save Task</button>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/tasks.js"></script>
</body>
</html>
